            schema:
              $ref: '#/components/schemas/AgregarEstadoAprobacionRequest'
      responses:
        '201':
          description: Estado de aprobación agregado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadoFichaPerfil'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Transición de estado no permitida o ficha no está "Disponible Para Evaluación"

  /representante/fichas-perfil/{fichaPerfilId}/items:
    get:
      tags: [Representante Comité Currículum]
      operationId: consultarItemsFichaPerfilAAprobar
      summary: Consultar items de la Ficha Perfil a aprobar
      description: |
        Permite consultar los items de una ficha perfil para evaluación y aprobación.
        
        **Evento:** Información Items que se aprueban Consultada  
        **Actores:** Representante Comité Currículum  
        **Políticas:** Item-POL-01, Item-POL-06
      parameters:
        - $ref: '#/components/parameters/FichaPerfilIdPath'
      responses:
        '200':
          description: Lista de items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
        '404':
          $ref: '#/components/responses/NotFound'

  /representante/evaluaciones-ficha-perfil:
    post:
      tags: [Representante Comité Currículum]
      operationId: registrarEvaluacionFichaPerfil
      summary: Registrar nueva evaluación de ficha de perfil
      description: |
        Permite registrar una nueva evaluación de una ficha de perfil.
        
        **Evento:** Evaluacion Ficha Perfil Registrado  
        **Actores:** RepresentanteComiteCurriculum  
        **Políticas:** EvaluacionFichaPerfil-POL-1, POL-02
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearEvaluacionFichaPerfilRequest'
      responses:
        '201':
          description: Evaluación registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluacionFichaPerfil'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Ya existe evaluación para la misma ficha/representante

  /representante/mis-evaluaciones:
    get:
      tags: [Representante Comité Currículum]
      operationId: consultarEvaluacionesGeneradas
      summary: Consultar evaluaciones de ficha de perfil generadas
      description: |
        Permite consultar las evaluaciones generadas por el representante.
        
        **Evento:** Información Evaluacion Ficha Perfil Consultada  
        **Actores:** RepresentanteComiteCurriculum  
        **Política:** EvaluacionFichaPerfil-POL-1
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista de evaluaciones generadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvaluacionFichaPerfil'

  /representante/evaluaciones-ficha-perfil/{evaluacionId}/estados:
    post:
      tags: [Representante Comité Currículum]
      operationId: agregarEstadoEvaluacionFicha
      summary: Agregar Estado Evaluación Ficha
      description: |
        Permite agregar un nuevo estado a una evaluación de ficha perfil.
        
        **Evento:** Nuevo Estado Evaluacion Ficha Agregado  
        **Actores:** RepresentanteComiteCurriculum  
        **Políticas:** EstadoEvaluacionFicha-POL-01 a POL-06
      parameters:
        - $ref: '#/components/parameters/EvaluacionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgregarEstadoEvaluacionRequest'
      responses:
        '201':
          description: Estado de evaluación agregado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadoEvaluacionFicha'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Estado duplicado o transición no permitida

  /representante/evaluaciones-ficha-perfil/{evaluacionId}/observaciones:
    post:
      tags: [Representante Comité Currículum]
      operationId: agregarObservacionEvaluacion
      summary: Agregar Observación Evaluación
      description: |
        Permite agregar una observación a una evaluación de ficha perfil.
        
        **Evento:** Observacion Evaluacion Agregada  
        **Actores:** Representante Comité Currículum  
        **Políticas:** ObservacionEvaluacion-POL-01, POL-02
      parameters:
        - $ref: '#/components/parameters/EvaluacionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearObservacionEvaluacionRequest'
      responses:
        '201':
          description: Observación agregada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservacionEvaluacion'
        '400':
          $ref: '#/components/responses/BadRequest'

  /representante/evaluaciones-ficha-perfil/{evaluacionId}/observaciones/{observacionEvaluacionId}:
    put:
      tags: [Representante Comité Currículum]
      operationId: modificarObservacionEvaluacion
      summary: Modificar Observación Evaluación
      description: |
        Permite modificar el contenido de una observación de evaluación.
        
        **Evento:** Observacion Evaluacion Modificada  
        **Actores:** Representante Comité Currículum  
        **Políticas:** ObservacionEvaluacion-POL-01, POL-03
      parameters:
        - $ref: '#/components/parameters/EvaluacionIdPath'
        - $ref: '#/components/parameters/ObservacionEvaluacionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificarObservacionRequest'
      responses:
        '200':
          description: Observación modificada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservacionEvaluacion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Representante Comité Currículum]
      operationId: removerObservacionEvaluacion
      summary: Remover Observación Evaluación
      description: |
        Permite remover una observación de evaluación.
        
        **Evento:** Observacion Evaluacion Removida  
        **Actores:** Representante Comité Currículum  
        **Política:** ObservacionEvaluacion-POL-01
      parameters:
        - $ref: '#/components/parameters/EvaluacionIdPath'
        - $ref: '#/components/parameters/ObservacionEvaluacionIdPath'
      responses:
        '204':
          description: Observación removida
        '404':
          $ref: '#/components/responses/NotFound'

# ═══════════════════════════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════════════════════════
components:

  # ── Parameters ──
  parameters:
    IdentificadorPath:
      name: identificador
      in: path
      required: true
      schema:
        type: string
        maxLength: 30

    FichaPerfilIdPath:
      name: fichaPerfilId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    EstudianteIdPath:
      name: estudianteId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ItemIdPath:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    RevisionItemIdPath:
      name: revisionItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ObservacionItemIdPath:
      name: observacionItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    EvaluacionIdPath:
      name: evaluacionId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ObservacionEvaluacionIdPath:
      name: observacionEvaluacionId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  # ── Responses ──
  responses:
    BadRequest:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ── Schemas ──
  schemas:

    # ─── Tablas de referencia ───
    EstadoFicha:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          maxLength: 20
        descripcion:
          type: string
          maxLength: 200

    EstadoEvaluacion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          maxLength: 20
        descripcion:
          type: string
          maxLength: 200

    EstadoObservacionRevision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          maxLength: 20
        descripcion:
          type: string
          maxLength: 200

    EstadoRevision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          maxLength: 20
        descripcion:
          type: string
          maxLength: 200

    TipoItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          maxLength: 20
        descripcion:
          type: string
          maxLength: 200

    # ─── Identidad ───
    EstudianteVinculadoResponse:
      type: object
      description: Información de un estudiante vinculado a una Ficha Perfil (incluye el ID del vínculo).
      properties:
        idVinculo:
          type: string
          format: uuid
          description: ID del registro EstudianteFichaPerfil. Usar para remover el vínculo.
        id:
          type: string
          format: uuid
          description: ID del estudiante.
        nombre:
          type: string
          maxLength: 100
          description: Nombre completo del estudiante.
        email:
          type: string
          format: email
          maxLength: 100
          description: Correo institucional del estudiante.

    Estudiante:
      type: object
      properties:
        id:
          type: string
          format: uuid
        identificador:
          type: string
          maxLength: 30
        nombre:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 50

    AsesorFicha:
      type: object
      properties:
        id:
          type: string
          format: uuid
        identificador:
          type: string
          maxLength: 30
        nombre:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 50

    RepresentanteComiteCurriculum:
      type: object
      properties:
        id:
          type: string
          format: uuid
        identificador:
          type: string
          maxLength: 30
        nombre:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 50

    # ─── Ficha Perfil ───
    MiFichaPerfilResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tituloProyecto:
          type: string
        asesor:
          $ref: '#/components/schemas/Asesor'
        estadoActual:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
            fechaActualizacion:
              type: string
              format: date-time
        integrantes:
          type: array
          items:
            $ref: '#/components/schemas/Estudiante'

    FichaPerfil:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tituloProyecto:
          type: string
          maxLength: 100
        asesorFichaId:
          type: string
          format: uuid

    FichaPerfilAsesor:
      type: object
      description: Proyección resumida de una Ficha Perfil para el listado del Asesor.
      properties:
        id:
          type: string
          format: uuid
        titulo:
          type: string
          maxLength: 100
          description: Título del proyecto.
        estadoActual:
          type: string
          description: Nombre del estado actual de la ficha perfil.
      required:
        - id
        - titulo
        - estadoActual

    PaginaFichasAsesor:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/FichaPerfilAsesor'
        totalElements:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    PaginaFichasPerfil:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/FichaPerfilResumen'
        totalElements:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    FichaPerfilResumen:
      type: object
      description: Proyección resumida de una Ficha Perfil para listados del Coordinador.
      properties:
        id:
          type: string
          format: uuid
        titulo:
          type: string
          maxLength: 100
          description: Título del proyecto (alias de tituloProyecto).
        asesor:
          type: object
          description: Asesor asignado a la ficha.
          properties:
            id:
              type: string
              format: uuid
            nombre:
              type: string
              maxLength: 50
            email:
              type: string
              format: email
              maxLength: 50

    RegistrarFichaPerfilRequest:
      type: object
      description: Payload para registrar una nueva Ficha de Perfil (Asesor Ficha o Coordinador).
      required:
        - titulo
        - idAsesorFicha
        - idEstudiantes
      properties:
        titulo:
          type: string
          minLength: 1
          maxLength: 100
          description: Título del proyecto. Debe ser único en el sistema.
        idAsesorFicha:
          type: string
          format: uuid
          description: ID del asesor asignado a la ficha.
        idEstudiantes:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          description: Lista de IDs de estudiantes (1–3, sin duplicados).
          items:
            type: string
            format: uuid

    FichaPerfilCreadaResponse:
      type: object
      description: Respuesta al registrar una nueva Ficha de Perfil.
      properties:
        id:
          type: string
          format: uuid
          description: ID de la ficha de perfil creada.

    CrearFichaPerfilRequest:
      type: object
      required:
        - tituloProyecto
        - asesorFichaId
      properties:
        tituloProyecto:
          type: string
          maxLength: 100
          minLength: 1
        asesorFichaId:
          type: string
          format: uuid

    ModificarFichaPerfilRequest:
      type: object
      required:
        - fichaPerfilId
        - tituloProyecto
      properties:
        fichaPerfilId:
          type: string
          format: uuid
          description: Identificador de la ficha de perfil a modificar.
        tituloProyecto:
          type: string
          maxLength: 100
          minLength: 1

    CambiarAsesorRequest:
      type: object
      description: Payload para cambiar el asesor asignado a una Ficha Perfil.
      required:
        - idFicha
        - idAsesorFicha
      properties:
        idFicha:
          type: string
          format: uuid
          description: ID de la ficha perfil a modificar.
        idAsesorFicha:
          type: string
          format: uuid
          description: ID del nuevo asesor. Debe ser distinto al asesor actual (POL-05).

    # ─── Estudiante Ficha Perfil ───
    EstudianteFichaPerfil:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fichaPerfilId:
          type: string
          format: uuid
        estudianteId:
          type: string
          format: uuid

    AsignarEstudianteRequest:
      type: object
      description: Payload para asignar un estudiante a una Ficha Perfil.
      required:
        - idFichaPerfil
        - idEstudiante
      properties:
        idFichaPerfil:
          type: string
          format: uuid
          description: ID de la ficha perfil a la que se asigna el estudiante.
        idEstudiante:
          type: string
          format: uuid
          description: ID del estudiante a vincular.

    AsignarEstudianteResponse:
      type: object
      description: Respuesta al asignar un estudiante a una Ficha Perfil.
      properties:
        idVinculo:
          type: string
          format: uuid
          description: ID del registro EstudianteFichaPerfil creado. Usar para remover el vínculo.

