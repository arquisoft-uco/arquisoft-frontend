        Permite consultar el estado de una ficha perfil que está evaluando.
        
        **Evento:** Estado Ficha Perfil a Evaluar consultado  
        **Actores:** RepresentanteComiteCurriculum  
        **Política:** EstadoFichaPerfil-POL-02
      parameters:
        - $ref: '#/components/parameters/FichaPerfilIdPath'
      responses:
        '200':
          description: Estados de la ficha perfil
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstadoFichaPerfil'
        '404':
          $ref: '#/components/responses/NotFound'

  /representante/fichas-perfil/{fichaPerfilId}/estados/aprobacion:
    post:
      tags: [Representante Comité Currículum]
      operationId: agregarEstadoFichaPerfilAprobacion
      summary: Agregar Estado Ficha Perfil de aprobación
      description: |
        Permite agregar un estado de aprobación/rechazo a una ficha perfil.
        
        **Evento:** Nuevo Estado Ficha Perfil con aprobacion Agregado  
        **Actores:** RepresentanteComiteCurriculum  
        **Políticas:** EstadoFichaPerfil-POL-02, POL-04, POL-06, POL-07, POL-08
      parameters:
        - $ref: '#/components/parameters/FichaPerfilIdPath'
      requestBody:
        required: true
