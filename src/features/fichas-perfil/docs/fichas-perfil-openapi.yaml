openapi: 3.0.3
info:
  title: API Fichas de Perfil - Arquisoft
  description: |
    Especificación OpenAPI para el bounded context de Fichas de Perfil.
    
    Derivada del Event Storming del dominio. Cada endpoint corresponde a una acción (caso de uso)
    identificada en el Event Storming. Los endpoints están agrupados por el **rol/actor** que los consume.

    ## Roles
    - **Coordinador** — Crea fichas, asigna estudiantes y asesores.
    - **Estudiante** — Desarrolla la ficha, gestiona ítems, consulta revisiones y evaluaciones.
    - **Asesor Ficha** — Asesora fichas, revisa ítems, genera observaciones sobre ítems.
    - **Representante Comité Currículum** — Evalúa fichas, genera observaciones de evaluación, aprueba/rechaza.

  version: 1.0.0
  contact:
    name: Equipo Arquisoft

servers:
  - url: /api/v1
    description: Base path de la API

tags:
  # ── Por Actor ──
  - name: Coordinador
    description: Endpoints consumidos por el Coordinador
  - name: Estudiante
    description: Endpoints consumidos por el Estudiante
  - name: Asesor Ficha
    description: Endpoints consumidos por el Asesor Ficha
  - name: Representante Comité Currículum
    description: Endpoints consumidos por el Representante Comité Currículum
  # ── Compartidos ──
  - name: Compartido
    description: Endpoints accesibles por múltiples roles (tablas de referencia y consultas de identidad)

# ═══════════════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════════════
paths:

  # ────────────────────────────────────────────────────────────────
  # COMPARTIDO — Tablas de referencia e identidad
  # ────────────────────────────────────────────────────────────────

  /estados-ficha:
    get:
      tags: [Compartido]
      operationId: consultarTodosEstadosFicha
      summary: Consultar todos los estados ficha
      description: |
        Permite conocer los estados ficha que pueden ser asignados a un estado ficha perfil.
        
        **Evento:** Todos los estados ficha consultados  
        **Actores:** Estudiante, RepresentanteComiteCurriculum, Asesor Ficha
      responses:
        '200':
          description: Lista de estados ficha
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstadoFicha'

  /estados-evaluacion:
    get:
      tags: [Compartido]
      operationId: consultarTodosEstadosEvaluacion
      summary: Consultar todos los estados de evaluación
      description: |
        Tabla de referencia de estados de evaluación.  
        **Actores:** RepresentanteComiteCurriculum, Estudiante, Asesor Ficha
      responses:
        '200':
          description: Lista de estados de evaluación
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstadoEvaluacion'

  /estados-revision:
    get:
      tags: [Compartido]
      operationId: consultarTodosEstadosRevision
      summary: Consultar todos los estados de revisión
      description: |
        Tabla de referencia de estados de revisión.  
        **Actores:** Asesor Ficha, Estudiante
      responses:
        '200':
          description: Lista de estados de revisión
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstadoRevision'

  /estados-observacion-revision:
    get:
      tags: [Compartido]
      operationId: consultarTodosEstadosObservacionRevision
      summary: Consultar todos los estados de observación revisión
      description: |
        Tabla de referencia de estados de observación revisión.  
        **Actores:** Asesor Ficha, Estudiante
      responses:
        '200':
          description: Lista de estados de observación revisión
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstadoObservacionRevision'

  /fichas-perfil/tipos-item:
    get:
      tags: [Compartido, Asesor Ficha]
      operationId: consultarTodosTipoItem
      summary: Consultar todos los tipo item disponibles
      description: |
        Permite conocer los tipos que pueden ser asignados a un item de una ficha de perfil.
        
        **Evento:** Todos los tipo item consultados  
        **Actores:** Asesor Ficha
      responses:
        '200':
          description: Lista de tipos de item
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TipoItem'

  /fichas-perfil/estudiantes:
    get:
      tags: [Compartido]
      operationId: consultarEstudiantesDisponibles
      summary: Consultar todos los estudiantes disponibles
      description: |
        Retorna la lista completa de estudiantes disponibles en el sistema.
        Usado para poblar selectores en los formularios de registro y asignación de estudiantes.

        **Evento:** Estudiantes Disponibles Consultados  
        **Actores:** Coordinador  
        **Política:** Estudiante-POL-01
      responses:
        '200':
          description: Lista de estudiantes disponibles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Estudiante'

  /estudiantes/{identificador}:
    get:
      tags: [Compartido]
      operationId: consultarEstudiante
      summary: Consultar información de un estudiante
      description: |
        Permite aplicar criterios de búsqueda para consultar la información de un estudiante.
        
        **Evento:** Estudiante consultado  
        **Actores:** Asesor Ficha, RepresentanteComiteCurriculum, Estudiante  
        **Política:** Estudiante-POL-1
      parameters:
        - $ref: '#/components/parameters/IdentificadorPath'
      responses:
        '200':
          description: Información del estudiante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estudiante'
        '404':
          $ref: '#/components/responses/NotFound'

  /fichas-perfil/asesores:
    get:
      tags: [Compartido]
      operationId: consultarAsesoresDisponibles
      summary: Consultar todos los asesores de ficha disponibles
      description: |
        Retorna la lista completa de asesores de ficha disponibles en el sistema.
        Usado para poblar selectores en los formularios de registro y cambio de asesor.

        **Evento:** Asesores de Ficha Disponibles Consultados  
        **Actores:** Coordinador
        **Política:** AsesorFicha-POL-01
      responses:
        '200':
          description: Lista de asesores disponibles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Asesor'

  /asesores-ficha/{identificador}:
    get:
      tags: [Compartido]
      operationId: consultarAsesorFicha
      summary: Consultar información de un asesor ficha
      description: |
        Permite aplicar criterios de búsqueda para consultar la información de un Asesor Ficha.
        
        **Evento:** Asesor Ficha Consultado  
        **Actores:** Asesor Ficha, RepresentanteComiteCurriculum, Estudiante  
        **Política:** AsesorFicha-POL-01
      parameters:
        - $ref: '#/components/parameters/IdentificadorPath'
      responses:
        '200':
          description: Información del asesor ficha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsesorFicha'
        '404':
          $ref: '#/components/responses/NotFound'

  /representantes-comite/{identificador}:
    get:
      tags: [Compartido]
      operationId: consultarRepresentanteComiteCurriculum
      summary: Consultar información Representante Comité Currículum
      description: |
        Permite aplicar criterios de búsqueda para consultar la información de un Representante Comité Currículum.
        
        **Evento:** Representante Comite Curricullum consultado  
        **Actores:** Asesor Ficha, Estudiante, Representante Comité Currículum  
        **Política:** RepresentanteComiteCurricullum-POL-01
      parameters:
        - $ref: '#/components/parameters/IdentificadorPath'
      responses:
        '200':
          description: Información del representante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepresentanteComiteCurriculum'
        '404':
          $ref: '#/components/responses/NotFound'

  # ────────────────────────────────────────────────────────────────
  # COORDINADOR
  # ────────────────────────────────────────────────────────────────

  /fichas-perfil:
    post:
      tags: [Coordinador]
      operationId: registrarFichaPerfilCoordinador
      summary: Registrar nueva información Ficha Perfil
      description: |
        Permite registrar información de una nueva ficha de perfil para ser visualizada y desarrollada por los usuarios.
        
        **Evento:** Nueva Ficha Perfil Asignada  
        **Actores:** Coordinador, Asesor Ficha  
        **Políticas:** FichaPerfil-POL-01, FichaPerfil-POL-02, FichaPerfil-POL-03, FichaPerfil-POL-04
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrarFichaPerfilRequest'
      responses:
        '201':
          description: Ficha perfil creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichaPerfilCreadaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: El título de la ficha perfil ya existe (FichaPerfil-POL-02)

  /fichas-perfil/coordinador:
    get:
      tags: [Coordinador]
      operationId: consultarFichasPerfilCoordinador
      summary: Consultar información de Fichas Perfil generadas por el Coordinador
      description: |
        Permite aplicar criterios de búsqueda para la información de las fichas de perfil en general.
        
        **Evento:** Información de Ficha Perfil Generada por Coordinador Consultada  
        **Actores:** Coordinador  
        **Política:** FichaPerfil-POL-01
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista de fichas perfil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginaFichasPerfil'

  /fichas-perfil/asesor:
    put:
      tags: [Coordinador]
      operationId: cambiarAsesorFichaPerfil
      summary: Cambiar Asesor Ficha para Ficha Perfil
      description: |
        Permite cambiar el Asesor Ficha de una Ficha Perfil en específico.
        
        **Evento:** Asesor Ficha Cambiado  
        **Actores:** Coordinador  
        **Políticas:** FichaPerfil-POL-01, FichaPerfil-POL-05
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarAsesorRequest'
      responses:
        '204':
          description: Asesor cambiado exitosamente. Sin cuerpo de respuesta.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: El nuevo asesor es el mismo que el actual (FichaPerfil-POL-05)

  /fichas-perfil/estudiantes:
    post:
      tags: [Coordinador]
      operationId: asignarEstudianteAFichaPerfil
      summary: Asignar estudiante a una ficha de perfil
      description: |
        Permite vincular un estudiante a una Ficha Perfil.
        
        **Evento:** Estudiante Asignado a Ficha Perfil  
        **Actores:** Coordinador  
        **Políticas:** FichaPerfil-POL-01, FichaPerfil-POL-03, FichaPerfil-POL-04
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarEstudianteRequest'
      responses:
        '200':
          description: Estudiante asignado. Retorna el ID del vínculo creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignarEstudianteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Estudiante ya asignado (POL-04) o límite de 3 alcanzado (POL-03)

  /fichas-perfil/{fichaPerfilId}/estudiantes:
    get:
      tags: [Coordinador]
      operationId: consultarEstudiantesVinculados
      summary: Consultar estudiantes vínculados a una ficha perfil
      description: |
        Permite conocer los estudiantes vinculados a una ficha de perfil específica.
        
        **Evento:** Estudiantes de una Ficha Perfil Consultados  
        **Actores:** Coordinador  
        **Política:** FichaPerfil-POL-01
      parameters:
        - $ref: '#/components/parameters/FichaPerfilIdPath'
      responses:
        '200':
          description: Lista de estudiantes vinculados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstudianteVinculadoResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /fichas-perfil/estudiantes/{idVinculo}:
    delete:
      tags: [Coordinador]
      operationId: removerEstudianteDeFichaPerfil
      summary: Remover estudiante de una ficha perfil
      description: |
        Permite remover el vínculo entre un estudiante y una Ficha Perfil.
        
        **Evento:** Estudiante Removido de Ficha Perfil  
        **Actores:** Coordinador  
        **Políticas:** FichaPerfil-POL-01, FichaPerfil-POL-06
      parameters:
        - name: idVinculo
          in: path
          required: true
          description: ID del registro EstudianteFichaPerfil a eliminar.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Vínculo eliminado exitosamente. Sin cuerpo de respuesta.
        '404':
          $ref: '#/components/responses/NotFound'

  # ────────────────────────────────────────────────────────────────
  # ESTUDIANTE
  # ────────────────────────────────────────────────────────────────

  /estudiante/{estudianteId}/mi-ficha:
    get:
      tags: [Estudiante]
      operationId: consultarMiFichaPerfil
      summary: Consultar información de la Ficha Perfil a la que pertenece
      description: |
        Permite consultar información de la ficha perfil en la cual el estudiante está asignado.
        La respuesta incluye los integrantes del grupo.
        
        **Evento:** Información de Ficha Perfil del Estudiante Consultada  
        **Actores:** Estudiante  
        **Política:** FichaPerfil-POL-01
      parameters:
        - name: estudianteId
          in: path
          required: true
          description: ID del estudiante autenticado (sub del JWT).
          schema:
            type: string
      responses:
        '200':
          description: Ficha perfil del estudiante con integrantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MiFichaPerfilResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /fichas-perfil/estudiante/mi-ficha:
    put:
      tags: [Estudiante]
      operationId: modificarFichaPerfil
      summary: Modificar título de Ficha Perfil
      description: |
        Permite modificar el título de la ficha de perfil.
        
        **Evento:** Ficha Perfil Modificada  
        **Actores:** Estudiante  
        **Política:** FichaPerfil-POL-01
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificarFichaPerfilRequest'
      responses:
        '200':
          description: Ficha perfil modificada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichaPerfil'
        '400':
          $ref: '#/components/responses/BadRequest'

  /estudiante/mi-ficha-perfil/estados:
    post:
      tags: [Estudiante]
      operationId: agregarEstadoFichaPerfilEstudiante
      summary: Agregar Estado Ficha Perfil
      description: |
        Permite agregar un nuevo estado a la ficha perfil (ej. "En Construccion", "Disponible para revisar").
        
        **Evento:** Nuevo Estado Ficha Perfil Agregado  
        **Actores:** Estudiante, Asesor Ficha  
        **Políticas:** EstadoFichaPerfil-POL-01 a POL-06
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgregarEstadoFichaPerfilRequest'
      responses:
        '201':
          description: Estado ficha perfil agregado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadoFichaPerfil'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Estado duplicado o transición no permitida

    get:
      tags: [Estudiante]
      operationId: consultarEstadoFichaPerfilEstudiante
      summary: Consultar información de Estado Ficha Perfil
      description: |
        Permite consultar información del Estado Ficha Perfil de la ficha que desarrolla el estudiante.
        
        **Evento:** Estado Ficha Perfil Consultado  
        **Actores:** Estudiante  
        **Política:** EstadoFichaPerfil-POL-02
      responses:
        '200':
          description: Estados de la ficha perfil
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstadoFichaPerfil'

  /fichas-perfil/estudiante/mi-ficha/items:
    get:
      tags: [Estudiante]
      operationId: consultarItemsMiFichaPerfil
      summary: Consultar información de los items de su Ficha Perfil
      description: |
        Permite la búsqueda de los items de la Ficha Perfil del estudiante.
        
        **Evento:** Información Item del Estudiante Consultada  
        **Actores:** Estudiante  
        **Políticas:** Item-POL-01, Item-POL-06
      parameters:
        - name: estudianteId
          in: query
          required: true
          description: ID del estudiante autenticado (sub del JWT)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'

  /fichas-perfil/estudiante/mi-ficha/items:
    post:
      tags: [Estudiante]
      operationId: agregarItemFichaPerfil
      description: |
        Permite agregar información importante para una ficha de perfil.
        
        **Evento:** Item Agregado a la ficha perfil  
        **Actores:** Estudiante  
        **Políticas:** Item-POL-1, Item-POL-02, Item-POL-03
        
        El response retorna únicamente el `id` generado. El cliente reconstruye
        el objeto `Item` completo usando los datos ya conocidos del formulario.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearItemRequest'
      responses:
        '201':
          description: Item agregado — retorna el id generado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCreadoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Tipo item duplicado en la ficha (Item-POL-02)

  /fichas-perfil/estudiante/mi-ficha/items:
    put:
      tags: [Estudiante]
      operationId: modificarItem
      summary: Modificar información de un Item
      description: |
        Permite modificar el contenido de un item existente.
        El `itemId` viaja en el body (no en el path).
        
        **Evento:** Información Item Modificada  
        **Actores:** Estudiante  
        **Políticas:** Item-POL-01, Item-POL-04
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificarItemRequest'
      responses:
        '204':
          description: Item modificado exitosamente — sin body
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: El ítem no pertenece a la ficha del estudiante autenticado
        '404':
          $ref: '#/components/responses/NotFound'

  /fichas-perfil/estudiante/mi-ficha/items/{itemId}:
    delete:
      tags: [Estudiante]
      operationId: removerItem
      summary: Remover información de un Item
      description: |
        Permite remover un item de la ficha de perfil.
        
        **Evento:** Información Item Removida  
        **Actores:** Estudiante  
        **Políticas:** Item-POL-01, Item-POL-05
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '204':
          description: Item removido
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: No se puede remover un item con revisión generada (Item-POL-05)

  /estudiante/mi-ficha-perfil/evaluaciones:
    get:
      tags: [Estudiante]
      operationId: consultarEvaluacionesMiFichaPerfil
      summary: Consultar evaluaciones de la Ficha Perfil que pertenece
      description: |
        Permite buscar las evaluaciones de la ficha perfil a la que pertenece el estudiante.
        
        **Evento:** Información Evaluacion Ficha Perfil que Pertenece Consultada  
        **Actores:** Estudiante  
        **Política:** EvaluacionFichaPerfil-POL-1
      responses:
        '200':
          description: Lista de evaluaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvaluacionFichaPerfil'

  /estudiante/mi-ficha-perfil/revisiones-items:
    get:
      tags: [Estudiante]
      operationId: consultarRevisionesItemsMiFichaPerfil
      summary: Consultar Revisiones Item de su Ficha Perfil
      description: |
        Permite consultar las revisiones de items de la ficha perfil del estudiante.
        
        **Evento:** Revision Item de su Ficha Perfil Consultada  
        **Actores:** Estudiante  
        **Política:** RevisionItem-POL-01
      responses:
        '200':
          description: Lista de revisiones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RevisionItem'

  /estudiante/mi-ficha-perfil/observaciones-items:
    get:
      tags: [Estudiante]
      operationId: consultarObservacionesItemsMiFichaPerfil
      summary: Consultar Observaciones Item de su Ficha Perfil
      description: |
        Permite consultar las observaciones de items de la ficha perfil del estudiante.
        
        **Evento:** Observacion Item de su Ficha Perfil Consultada  
        **Actores:** Estudiante  
        **Política:** ObservacionEvaluacion-POL-01
      responses:
        '200':
          description: Lista de observaciones de items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObservacionItem'

  /estudiante/mi-ficha-perfil/observaciones-evaluacion:
    get:
      tags: [Estudiante]
      operationId: consultarObservacionesEvaluacionMiFichaPerfil
      summary: Consultar Observaciones Evaluación de su Ficha Perfil
      description: |
        Permite consultar las observaciones de evaluación de la ficha perfil del estudiante.
        
        **Evento:** Observacion Evaluacion de su Ficha Perfil Consultada  
        **Actores:** Estudiante  
        **Política:** ObservacionEvaluacion-POL-01
      responses:
        '200':
          description: Lista de observaciones de evaluación
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObservacionEvaluacion'

  # ────────────────────────────────────────────────────────────────
  # ASESOR FICHA
  # ────────────────────────────────────────────────────────────────

  /asesor/fichas-perfil:
    post:
      tags: [Asesor Ficha]
      operationId: registrarFichaPerfilAsesor
      summary: Registrar nueva información Ficha Perfil
      description: |
        Permite registrar información de una nueva ficha de perfil.
        
        **Evento:** Nueva Ficha Perfil Asignada  
        **Actores:** Coordinador, Asesor Ficha  
        **Políticas:** FichaPerfil-POL-01, FichaPerfil-POL-02, FichaPerfil-POL-03, FichaPerfil-POL-04
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrarFichaPerfilRequest'
      responses:
        '201':
          description: Ficha perfil creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichaPerfilCreadaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: El título de la ficha perfil ya existe

  /fichas-perfil/asesor-ficha:
    get:
      tags: [Asesor Ficha]
      operationId: consultarFichasPerfilQueAsesora
      summary: Consultar Fichas Perfil que asesora
      description: |
        Permite consultar las fichas de perfil que asesora el Asesor Ficha.
        
        **HU:** HU207 — Consultar fichas de perfil que asesora  
        **Evento:** Información de Ficha Perfil Consultada Por Asesor Ficha  
        **Actores:** Asesor Ficha  
        **Política:** FichaPerfil-POL-01
      parameters:
        - name: asesorId
          in: query
          required: true
          description: UUID del asesor (obtenido del token Keycloak, campo `sub`)
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista paginada de fichas perfil del asesor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginaFichasAsesor'
        '400':
          $ref: '#/components/responses/BadRequest'

  /asesor/revisiones-items:
    post:
      tags: [Asesor Ficha]
      operationId: agregarRevisionItem
      summary: Agregar Revisión Item
      description: |
        Permite agregar una revisión a un item de una ficha de perfil.
        
        **Evento:** Revision Item Agregado  
        **Actores:** Asesor Ficha  
        **Políticas:** RevisionItem-POL-01, RevisionItem-POL-02
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearRevisionItemRequest'
      responses:
        '201':
          description: Revisión creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Ya existe una revisión para el mismo item (RevisionItem-POL-02)

  /asesor/mis-revisiones-items:
    get:
      tags: [Asesor Ficha]
      operationId: consultarRevisionesItemElaboradas
      summary: Consultar Revisiones Item elaboradas
      description: |
        Permite consultar las revisiones de items que ha elaborado el asesor.
        
        **Evento:** Revision Item Elaborada por Asesor Ficha Consultada  
        **Actores:** Asesor Ficha  
        **Política:** RevisionItem-POL-01
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista de revisiones elaboradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RevisionItem'

  /asesor/revisiones-items/{revisionItemId}:
    put:
      tags: [Asesor Ficha]
      operationId: modificarRevisionItem
      summary: Modificar Revisión Item
      description: |
        Permite modificar una revisión de item (estado de revisión).
        
        **Evento:** Revision Item Modificado  
        **Actores:** Asesor Ficha  
        **Políticas:** RevisionItem-POL-01, RevisionItem-POL-02
      parameters:
        - $ref: '#/components/parameters/RevisionItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificarRevisionItemRequest'
      responses:
        '200':
          description: Revisión modificada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Asesor Ficha]
      operationId: removerRevisionItem
      summary: Remover Revisión Item
      description: |
        Permite remover una revisión de item junto con sus observaciones.
        
        **Evento:** Revision Item Removido  
        **Actores:** Asesor Ficha  
        **Políticas:** RevisionItem-POL-01, RevisionItem-POL-03
      parameters:
        - $ref: '#/components/parameters/RevisionItemIdPath'
      responses:
        '204':
          description: Revisión removida (junto con observaciones asociadas)
        '404':
          $ref: '#/components/responses/NotFound'

  /asesor/observaciones-items:
    post:
      tags: [Asesor Ficha]
      operationId: agregarObservacionItem
      summary: Agregar Observación Item
      description: |
        Permite agregar una observación a una revisión de item.
        
        **Evento:** Observacion Evaluacion Agregada (Observacion Item)  
        **Actores:** Asesor Ficha  
        **Políticas:** ObservacionEvaluacion-POL-01, POL-02
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearObservacionItemRequest'
      responses:
        '201':
          description: Observación creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservacionItem'
        '400':
          $ref: '#/components/responses/BadRequest'

  /asesor/mis-observaciones-items:
    get:
      tags: [Asesor Ficha]
      operationId: consultarObservacionesItemElaboradas
      summary: Consultar Observaciones Item elaboradas
      description: |
        Permite consultar las observaciones de items que ha elaborado el asesor.
        
        **Evento:** Observacion Item Elaborada por Asesor Ficha Consultada  
        **Actores:** Asesor Ficha  
        **Política:** ObservacionEvaluacion-POL-01
      responses:
        '200':
          description: Lista de observaciones elaboradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObservacionItem'

  /asesor/observaciones-items/{observacionItemId}:
    put:
      tags: [Asesor Ficha]
      operationId: modificarObservacionItem
      summary: Modificar Observación Item
      description: |
        Permite modificar el contenido de una observación de item.
        
        **Evento:** Observacion Evaluacion Modificada (Observacion Item)  
        **Actores:** Asesor Ficha  
        **Políticas:** ObservacionEvaluacion-POL-01, POL-03
      parameters:
        - $ref: '#/components/parameters/ObservacionItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificarObservacionRequest'
      responses:
        '200':
          description: Observación modificada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservacionItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Asesor Ficha]
      operationId: removerObservacionItem
      summary: Remover Observación Item
      description: |
        Permite remover una observación de item.
        
        **Evento:** Observacion Evaluacion Removida (Observacion Item)  
        **Actores:** Asesor Ficha  
        **Política:** ObservacionEvaluacion-POL-01
      parameters:
        - $ref: '#/components/parameters/ObservacionItemIdPath'
      responses:
        '204':
          description: Observación removida
        '404':
          $ref: '#/components/responses/NotFound'

  # ────────────────────────────────────────────────────────────────
  # REPRESENTANTE COMITÉ CURRÍCULUM
  # ────────────────────────────────────────────────────────────────

  /representante/fichas-perfil/{fichaPerfilId}/estados:
