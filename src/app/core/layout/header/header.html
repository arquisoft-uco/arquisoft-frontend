<header
  class="flex h-16 shrink-0 items-center gap-2 border-b border-border bg-surface px-4"
  role="banner">
  <button
    class="flex h-9 w-9 items-center justify-center rounded-lg text-on-surface-secondary transition-colors duration-150 hover:bg-primary-muted hover:text-primary focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
    (click)="menuToggled.emit()"
    aria-label="Alternar menú de navegación">
    <lucide-angular [img]="MenuIcon" [size]="20" aria-hidden="true" />
  </button>

  <div class="ml-1 flex items-center gap-2">
    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary">
      <span class="text-sm font-bold text-primary-foreground">A</span>
    </div>
    <div class="hidden sm:block">
      <span class="text-base font-bold tracking-tight text-on-surface">ArquiSoft</span>
      <span class="ml-1.5 text-xs text-on-surface-secondary">Portal Académico</span>
    </div>
  </div>

  <span class="flex-1" aria-hidden="true"></span>

  <!-- Role selector or role badge -->
  @if (tieneMultiplesRoles()) {
    <div class="relative">
      <button
        class="flex items-center gap-1.5 rounded-lg border border-border px-3 py-1.5 text-sm font-medium text-on-surface transition-colors hover:bg-primary-muted focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
        (click)="toggleRolMenu($event)"
        [attr.aria-expanded]="rolMenuOpen()"
        [title]="'Rol activo: ' + etiquetaRolActivo()"
        aria-haspopup="true"
        [attr.aria-label]="'Rol activo: ' + etiquetaRolActivo() + '. Haz clic para cambiar.'">
        <lucide-angular [img]="UserCogIcon" [size]="16" class="text-primary" aria-hidden="true" />
        <span class="max-w-[140px] overflow-hidden text-ellipsis whitespace-nowrap">
          {{ etiquetaRolActivo() }}
        </span>
        <lucide-angular [img]="ChevronDownIcon" [size]="14" class="text-on-surface-secondary" aria-hidden="true"
          [class.rotate-180]="rolMenuOpen()"
          style="transition: transform 0.15s ease-out" />
      </button>

      @if (rolMenuOpen()) {
        <div
          class="animate-scale-in absolute right-0 top-full z-50 mt-1.5 min-w-[200px] overflow-hidden rounded-xl border border-border bg-surface shadow-dropdown"
          role="menu"
          aria-label="Cambiar rol activo"
          (click)="$event.stopPropagation()">
          <div class="px-3 py-2 text-xs font-semibold uppercase tracking-wider text-on-surface-secondary">
            Cambiar rol
          </div>
          @for (rol of rolActivoService.rolesDisponibles(); track rol) {
            <button
              class="flex w-full items-center px-3 py-2.5 text-sm text-on-surface transition-colors hover:bg-primary-muted focus-visible:bg-primary-muted focus-visible:outline-none"
              [class.font-semibold]="rolActivoService.rolActivo() === rol"
              [class.text-primary]="rolActivoService.rolActivo() === rol"
              [class.bg-primary-muted]="rolActivoService.rolActivo() === rol"
              role="menuitem"
              (click)="seleccionarRol(rol)">
              {{ etiquetaDeRol(rol) }}
            </button>
          }
        </div>
      }
    </div>
  } @else {
    <span
      class="flex items-center gap-1.5 rounded-lg bg-primary-muted px-3 py-1.5 text-sm font-medium text-primary"
      [attr.aria-label]="'Rol activo: ' + etiquetaRolActivo()">
      <lucide-angular [img]="UserCogIcon" [size]="16" aria-hidden="true" />
      <span class="max-w-[140px] overflow-hidden text-ellipsis whitespace-nowrap">
        {{ etiquetaRolActivo() }}
      </span>
    </span>
  }

  <!-- User menu -->
  <div class="relative ml-1">
    <button
      class="flex h-9 w-9 items-center justify-center rounded-full bg-primary text-primary-foreground transition-colors hover:bg-primary-hover focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
      (click)="toggleUserMenu($event)"
      [attr.aria-expanded]="userMenuOpen()"
      aria-label="Menú de cuenta de usuario"
      aria-haspopup="true">
      <lucide-angular [img]="CircleUserIcon" [size]="20" aria-hidden="true" />
    </button>

    @if (userMenuOpen()) {
      <div
        class="animate-scale-in absolute right-0 top-full z-50 mt-1.5 min-w-[200px] overflow-hidden rounded-xl border border-border bg-surface shadow-dropdown"
        role="menu"
        (click)="$event.stopPropagation()">
        <div class="border-b border-border px-4 py-3">
          <p class="text-sm font-semibold text-on-surface">{{ keycloak.username() }}</p>
          <p class="text-xs text-on-surface-secondary">{{ etiquetaRolActivo() }}</p>
        </div>
        <div class="p-1">
          <button
            class="flex w-full items-center gap-2.5 rounded-lg px-3 py-2.5 text-sm text-on-surface transition-colors hover:bg-primary-muted focus-visible:bg-primary-muted focus-visible:outline-none"
            role="menuitem"
            (click)="logout()">
            <lucide-angular [img]="LogOutIcon" [size]="16" class="text-on-surface-secondary" aria-hidden="true" />
            Cerrar sesión
          </button>
        </div>
      </div>
    }
  </div>
</header>
