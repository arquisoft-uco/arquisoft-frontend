<mat-toolbar color="primary" role="banner">
  <button
    mat-icon-button
    (click)="menuToggled.emit()"
    aria-label="Alternar menú de navegación">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="app-title">ArquiSoft</span>

  <span class="spacer" aria-hidden="true"></span>

  @if (tieneMultiplesRoles()) {
    <button
      mat-button
      class="rol-selector"
      [matMenuTriggerFor]="rolMenu"
      [matTooltip]="'Rol activo: ' + etiquetaRolActivo()"
      aria-haspopup="true"
      [attr.aria-label]="'Rol activo: ' + etiquetaRolActivo() + '. Haz clic para cambiar.'">
      <mat-icon aria-hidden="true">manage_accounts</mat-icon>
      <span class="rol-nombre">{{ etiquetaRolActivo() }}</span>
    </button>
  } @else {
    <span
      class="rol-badge"
      [attr.aria-label]="'Rol activo: ' + etiquetaRolActivo()">
      <mat-icon aria-hidden="true">manage_accounts</mat-icon>
      <span class="rol-nombre">{{ etiquetaRolActivo() }}</span>
    </span>
  }

  <button
    mat-icon-button
    [matMenuTriggerFor]="userMenu"
    aria-label="Menú de cuenta de usuario"
    aria-haspopup="true">
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<mat-menu #rolMenu="matMenu" aria-label="Cambiar rol activo">
  @for (rol of rolActivoService.rolesDisponibles(); track rol) {
    <button
      mat-menu-item
      (click)="seleccionarRol(rol)"
      [class.rol-activo]="rolActivoService.rolActivo() === rol">
      <span>{{ etiquetaDeRol(rol) }}</span>
    </button>
  }
</mat-menu>

<mat-menu #userMenu="matMenu">
  <div class="user-info" role="menuitem" aria-disabled="true">
    <span>{{ keycloak.username() }}</span>
  </div>
  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Cerrar sesión</span>
  </button>
</mat-menu>
