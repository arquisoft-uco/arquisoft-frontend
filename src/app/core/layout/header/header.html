<header
  class="flex h-14 shrink-0 items-center gap-1 border-b border-primary-hover bg-primary px-3 shadow-sm"
  role="banner">
  <button
    class="flex h-9 w-9 items-center justify-center rounded-full text-primary-foreground transition-colors duration-150 hover:bg-white/15 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
    (click)="menuToggled.emit()"
    aria-label="Alternar menú de navegación">
    <lucide-angular [img]="MenuIcon" [size]="20" aria-hidden="true" />
  </button>

  <span class="ml-1 text-lg font-bold tracking-tight text-primary-foreground">ArquiSoft</span>

  <span class="flex-1" aria-hidden="true"></span>

  <!-- Role selector or role badge -->
  @if (tieneMultiplesRoles()) {
    <div class="relative">
      <button
        class="flex items-center gap-1.5 rounded-full px-3 py-1.5 text-sm font-medium text-primary-foreground transition-colors hover:bg-white/15 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
        (click)="toggleRolMenu($event)"
        [attr.aria-expanded]="rolMenuOpen()"
        [title]="'Rol activo: ' + etiquetaRolActivo()"
        aria-haspopup="true"
        [attr.aria-label]="'Rol activo: ' + etiquetaRolActivo() + '. Haz clic para cambiar.'">
        <lucide-angular [img]="UserCogIcon" [size]="16" aria-hidden="true" />
        <span class="max-w-[140px] overflow-hidden text-ellipsis whitespace-nowrap">
          {{ etiquetaRolActivo() }}
        </span>
        <lucide-angular [img]="ChevronDownIcon" [size]="14" aria-hidden="true"
          class="transition-transform duration-150"
          [class.rotate-180]="rolMenuOpen()" />
      </button>

      @if (rolMenuOpen()) {
        <div
          class="absolute right-0 top-full z-50 mt-1.5 min-w-[180px] overflow-hidden rounded-lg border border-border bg-surface shadow-lg"
          role="menu"
          aria-label="Cambiar rol activo"
          (click)="$event.stopPropagation()">
          @for (rol of rolActivoService.rolesDisponibles(); track rol) {
            <button
              class="flex w-full items-center px-4 py-2.5 text-sm text-on-surface transition-colors hover:bg-background focus-visible:bg-background focus-visible:outline-none"
              [class.font-semibold]="rolActivoService.rolActivo() === rol"
              [class.text-primary]="rolActivoService.rolActivo() === rol"
              role="menuitem"
              (click)="seleccionarRol(rol)">
              {{ etiquetaDeRol(rol) }}
            </button>
          }
        </div>
      }
    </div>
  } @else {
    <span
      class="flex items-center gap-1.5 px-2 text-sm text-primary-foreground opacity-90"
      [attr.aria-label]="'Rol activo: ' + etiquetaRolActivo()">
      <lucide-angular [img]="UserCogIcon" [size]="16" aria-hidden="true" />
      <span class="max-w-[140px] overflow-hidden text-ellipsis whitespace-nowrap font-medium">
        {{ etiquetaRolActivo() }}
      </span>
    </span>
  }

  <!-- User menu -->
  <div class="relative">
    <button
      class="flex h-9 w-9 items-center justify-center rounded-full text-primary-foreground transition-colors hover:bg-white/15 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
      (click)="toggleUserMenu($event)"
      [attr.aria-expanded]="userMenuOpen()"
      aria-label="Menú de cuenta de usuario"
      aria-haspopup="true">
      <lucide-angular [img]="CircleUserIcon" [size]="22" aria-hidden="true" />
    </button>

    @if (userMenuOpen()) {
      <div
        class="absolute right-0 top-full z-50 mt-1.5 min-w-[180px] overflow-hidden rounded-lg border border-border bg-surface shadow-lg"
        role="menu"
        (click)="$event.stopPropagation()">
        <div
          class="border-b border-border px-4 py-2.5 text-sm font-medium text-on-surface"
          role="menuitem"
          aria-disabled="true">
          {{ keycloak.username() }}
        </div>
        <button
          class="flex w-full items-center gap-2.5 px-4 py-2.5 text-sm text-on-surface transition-colors hover:bg-background focus-visible:bg-background focus-visible:outline-none"
          role="menuitem"
          (click)="logout()">
          <lucide-angular [img]="LogOutIcon" [size]="16" class="text-on-surface-secondary" aria-hidden="true" />
          Cerrar sesión
        </button>
      </div>
    }
  </div>
</header>
