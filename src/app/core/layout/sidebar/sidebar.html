<div class="brand flex items-center gap-2.5 border-b border-border px-4 py-4">
  <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-primary">
    <lucide-angular [img]="UniversityIcon" [size]="16" class="text-primary-foreground" aria-hidden="true" />
  </div>
  <span class="font-semibold tracking-tight text-on-surface">ArquiSoft</span>
</div>

<nav class="flex flex-col gap-0.5 p-3" aria-label="Navegación principal">
  @for (item of navItems(); track item.route) {
    <a
      [routerLink]="item.route"
      routerLinkActive="nav-active"
      class="nav-link flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium outline-none transition-colors duration-150 focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-1"
      [attr.aria-label]="item.label">
      <lucide-angular [img]="item.icon" [size]="18" class="nav-icon shrink-0" aria-hidden="true" />
      <span>{{ item.label }}</span>
    </a>
  }
</nav>
