<div class="flex h-full">
  @if (sidenavOpen()) {
    <aside
      class="w-[260px] shrink-0 animate-slide-in-left overflow-y-auto border-r border-border bg-surface"
      role="navigation"
      aria-label="Navegación principal">
      <app-sidebar />
    </aside>
  }

  <div class="flex min-w-0 flex-1 flex-col">
    <app-header (menuToggled)="toggleSidenav()" />
    <main class="flex-1 overflow-y-auto bg-background p-6 lg:p-8" id="main-content">
      <router-outlet />
    </main>
  </div>
</div>
