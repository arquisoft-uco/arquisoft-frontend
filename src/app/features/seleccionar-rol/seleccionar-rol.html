<main
  class="flex w-full flex-col items-center justify-center px-4 py-12"
  role="main">

  <!-- Header / branding -->
  <header class="mb-10 text-center">
    <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-primary shadow-lg">
      <lucide-angular [img]="UniversityIcon" [size]="30" class="text-primary-foreground" aria-hidden="true" />
    </div>
    <h1 id="titulo-seleccion" class="text-2xl font-bold text-on-surface">Selecciona tu rol</h1>
    <p class="mt-2 text-sm text-on-surface-secondary">
      Elige el rol con el que deseas acceder al sistema.
    </p>
  </header>

  <!-- Role grid -->
  <section
    class="w-full max-w-xl"
    aria-labelledby="titulo-seleccion"
    aria-label="Roles disponibles">
    <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
      @for (rol of rolActivoService.rolesDisponibles(); track rol) {
        <button
          class="group flex flex-col items-center gap-3 rounded-xl border border-border bg-surface px-4 py-6 text-center shadow-sm outline-none transition-all duration-200 hover:border-primary hover:shadow-md active:scale-[0.97] focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
          type="button"
          (click)="seleccionarRol(rol)"
          [attr.aria-label]="'Seleccionar rol: ' + etiquetasRol[rol]">
          <div
            class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary-muted transition-colors duration-200 group-hover:bg-primary group-focus-visible:bg-primary">
            <lucide-angular
              [img]="iconosRol[rol]"
              [size]="24"
              class="role-icon text-primary-muted-foreground transition-colors duration-200 group-hover:text-primary-foreground group-focus-visible:text-primary-foreground"
              aria-hidden="true" />
          </div>
          <span class="text-sm font-semibold leading-snug text-on-surface">
            {{ etiquetasRol[rol] }}
          </span>
        </button>
      } @empty {
        <div class="col-span-full py-10 text-center">
          <p class="text-sm text-on-surface-secondary" role="status">
            No se encontraron roles asignados para tu cuenta. Contacta al administrador.
          </p>
        </div>
      }
    </div>
  </section>
</main>
