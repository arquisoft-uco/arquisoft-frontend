<div class="contenedor" role="main">
  <header class="cabecera" aria-labelledby="titulo-seleccion">
    <h1 id="titulo-seleccion" class="titulo">Selecciona tu rol</h1>
    <p class="subtitulo">Elige el rol con el que deseas interactuar en el sistema.</p>
  </header>

  <section
    class="cuadricula-roles"
    aria-label="Roles disponibles">
    @for (rol of rolActivoService.rolesDisponibles(); track rol) {
      <button
        class="tarjeta-rol"
        type="button"
        (click)="seleccionarRol(rol)"
        [attr.aria-label]="'Seleccionar rol de ' + etiquetasRol[rol]">
        <mat-icon class="icono-rol" aria-hidden="true">{{ iconosRol[rol] }}</mat-icon>
        <span class="nombre-rol">{{ etiquetasRol[rol] }}</span>
      </button>
    } @empty {
      <p class="sin-roles" role="status">
        No se encontraron roles asignados para tu cuenta. Contacta al administrador.
      </p>
    }
  </section>
</div>
