<div class="flex flex-col gap-6 animate-fade-up">
  <header>
    <h1 class="text-2xl font-bold text-on-surface">Example Domain</h1>
  </header>

  <section class="overflow-hidden rounded-xl border border-border bg-surface shadow-sm">
    @if (itemsResource.isLoading()) {
      <app-loading />
    } @else if (itemsResource.error()) {
      <p class="p-6 text-sm text-on-surface-secondary" role="alert">Error al cargar los datos.</p>
    } @else {
      <div class="overflow-x-auto">
        <table class="w-full text-sm" aria-label="Listado de items">
          <thead>
            <tr class="border-b border-border bg-background">
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-on-surface-secondary" scope="col">ID</th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-on-surface-secondary" scope="col">Nombre</th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-on-surface-secondary" scope="col">Descripción</th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-on-surface-secondary" scope="col">Creado</th>
            </tr>
          </thead>
          <tbody>
            @for (item of itemsResource.value(); track item.id) {
              <tr class="border-b border-border transition-colors last:border-0 hover:bg-background">
                <td class="px-4 py-3 text-on-surface-secondary">{{ item.id }}</td>
                <td class="px-4 py-3 font-medium text-on-surface">{{ item.name }}</td>
                <td class="px-4 py-3 text-on-surface-secondary">{{ item.description }}</td>
                <td class="px-4 py-3 text-on-surface-secondary">{{ item.createdAt }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  </section>
</div>
