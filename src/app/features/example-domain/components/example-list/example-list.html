<mat-card>
  <mat-card-header>
    <mat-card-title>Example Domain</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (itemsResource.isLoading()) {
      <app-loading />
    } @else if (itemsResource.error()) {
      <p role="alert">Error al cargar los datos.</p>
    } @else {
      <table
        mat-table
        [dataSource]="itemsResource.value() ?? []"
        aria-label="Listado de items">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef scope="col">ID</th>
          <td mat-cell *matCellDef="let item">{{ item.id }}</td>
        </ng-container>
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef scope="col">Nombre</th>
          <td mat-cell *matCellDef="let item">{{ item.name }}</td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef scope="col">Descripción</th>
          <td mat-cell *matCellDef="let item">{{ item.description }}</td>
        </ng-container>
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef scope="col">Creado</th>
          <td mat-cell *matCellDef="let item">{{ item.createdAt }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    }
  </mat-card-content>
</mat-card>
